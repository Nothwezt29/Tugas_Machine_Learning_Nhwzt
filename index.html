<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI System | Visual Analysis Beta</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #ec4899;
            --bg-grad: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        h1 {
            font-weight: 800;
            font-size: 1.5rem;
            color: #1e1b4b;
            margin-bottom: 8px;
            transition: color 0.5s;
        }

        .status-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 24px;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #e2e8f0;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            margin-bottom: 16px;
        }

        .btn-main {
            background: #1e1b4b;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        #result-display { margin-top: 30px; animation: fadeIn 0.8s ease; }

        .name-reveal {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 12px;
            transition: color 0.5s;
        }

        .analysis-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 20px;
            min-height: 45px;
        }

        #profile-pic {
            width: 110px; height: 110px;
            border-radius: 24px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-retry {
            background: white;
            color: #1e1b4b;
            border: 1px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }

        #btn-wrong {
            background: #fee2e2;
            color: #991b1b;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .pulse {
            width: 12px; height: 12px; background: var(--primary); border-radius: 50%;
            animation: pulse-ani 1.5s infinite; margin: 30px auto;
        }
        @keyframes pulse-ani { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body>

    <div class="main-card" id="card">
        <div class="status-badge">System Online</div>
        <h1>Visual Analyzer</h1>
        <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 30px;">Lab Task ID: Core-X v1.02</p>

        <div id="input-section">
            <input type="text" id="nameInput" class="input-box" placeholder="Input target name..." autocomplete="off">
            <button class="btn-main" onclick="runAnalysis()">Start Scanning</button>
        </div>

        <div id="loader-section" class="hidden">
            <div class="pulse"></div>
            <p style="font-size: 0.8rem; color: #64748b; font-weight: 500;">Reading Neural Patterns...</p>
        </div>

        <div id="result-display" class="hidden">
            <div class="name-reveal">Zahra Lesyia Putri</div>
            <img id="profile-pic" src="monyet.jpg" onerror="this.src='https://via.placeholder.com/150/6366f1/ffffff?text=Zahra'" alt="Profile">
            <div class="analysis-text" id="typewriter"></div>
            
            <div style="display: flex; gap: 12px; min-height: 50px; align-items: center;" id="action-buttons">
                <button class="btn-retry" onclick="runAnalysis()">Re-scan</button>
                <button id="btn-wrong" onmouseover="dodgeButton(event)" onclick="dodgeButton(event)" ontouchstart="dodgeButton(event)">Data Salah</button>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            "Analisis Selesai: Zahra Lesyia Putri ditemukan memiliki tingkat radiasi kecantikan yang masih stabil sejak zaman sekolah.",
            "Data Valid: Subjek terdeteksi tetap menawan tanpa perlu filter tambahan. Sistem hampir error karena terlalu silau.",
            "Hasil Pemindaian: Zahra terdeteksi sebagai alasan utama seseorang rajin berangkat ke sekolah dulu. Akurasi 99.9%.",
            "Peringatan: Tingkat manis subjek berada di atas rata-rata nasional. Harap kurangi konsumsi gula saat melihat wajahnya.",
            "Neural Pattern Terdeteksi: Memori tentang subjek ini masih tersimpan rapi di folder 'Penting' dalam database kami.",
            "Update Sistem: Tidak ditemukan perubahan signifikan. Masih secantik dulu, cuma yang sekarang versinya lebih premium.",
            "Error 404: Kata-kata pujian yang pas tidak ditemukan di kamus, karena subjek terlalu sulit untuk didefinisikan.",
            "Hasil Lab: Subjek memiliki aura positif yang bisa menaikkan mood secara instan tanpa bantuan kopi.",
            "Database Note: Nama Zahra Lesyia Putri otomatis terkunci sebagai standar visual tertinggi dalam sistem ini."
        ];

        const colors = [
            { primary: '#4f46e5', bg: 'linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%)' },
            { primary: '#059669', bg: 'linear-gradient(135deg, #d1fae5 0%, #ecfdf5 100%)' },
            { primary: '#d97706', bg: 'linear-gradient(135deg, #fef3c7 0%, #fffbeb 100%)' },
            { primary: '#db2777', bg: 'linear-gradient(135deg, #fce7f3 0%, #fdf2f8 100%)' },
            { primary: '#7c3aed', bg: 'linear-gradient(135deg, #ede9fe 0%, #f5f3ff 100%)' }
        ];

        function changeTheme() {
            const theme = colors[Math.floor(Math.random() * colors.length)];
            document.documentElement.style.setProperty('--primary', theme.primary);
            document.body.style.background = theme.bg;
        }

        function runAnalysis() {
            const input = document.getElementById('nameInput').value;
            if(!input) return alert("Input nama target dulu!");

            changeTheme(); // Ganti warna setiap scan/rescan
            
            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('result-display').classList.add('hidden');
            document.getElementById('loader-section').classList.remove('hidden');

            // Reset tombol salah ke posisi awal
            const btn = document.getElementById('btn-wrong');
            btn.style.position = 'static';
            btn.style.left = 'auto';
            btn.style.top = 'auto';

            setTimeout(() => {
                document.getElementById('loader-section').classList.add('hidden');
                document.getElementById('result-display').classList.remove('hidden');
                const text = quotes[Math.floor(Math.random() * quotes.length)];
                typeWriterEffect(text);
            }, 1500);
        }

        function typeWriterEffect(text) {
            const element = document.getElementById('typewriter');
            element.innerHTML = "";
            let i = 0;
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typing, 30);
                }
            }
            typing();
        }

        function dodgeButton(event) {
            // Mencegah klik beneran (penting untuk HP)
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }

            const btn = document.getElementById('btn-wrong');
            const card = document.getElementById('card');
            const cardRect = card.getBoundingClientRect();
            
            // Mengatur posisi absolute agar bisa pindah
            btn.style.position = 'absolute';

            // Hitung batas aman di dalam kotak kartu
            const padding = 20;
            const maxX = cardRect.width - btn.offsetWidth - padding;
            const maxY = cardRect.height - btn.offsetHeight - padding;

            // Koordinat acak
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            // Terapkan posisi baru
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '1000';
        }
    </script>
</body>
</html>
